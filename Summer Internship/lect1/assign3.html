<!doctype html>
<html>
  <head>
    <title>Block vs Inline Demonstration</title>
    <style>
      div {
        background-color: lightblue;
        border: 1px solid black;
        margin: 5px;
        padding: 10px;
      }
      h1 {
        color: red;
      }
      h2 {
        color: gold;
      }

      span {
        background-color: lightgreen;
        border: 1px solid black;
        padding: 5px;
      }
    </style>
  </head>
  <body style="background-color: black">
    <h1><i><u>Block Elements (div)</u> :-</i></h1>
    <h2>Div is a block element that starts from new line<br>Eg:h1,h2,p,etc.,tags</h2>
    <div>Div Element 1</div>
    <div>Div Element 2</div>
    <div>Div Element 3</div>
    <h1><i><u>Inline Elements (span)</u> :-</i></h1>
    <h2>Span is a Inline element that starts from same line <br>Eg:a,b,img,etc.,tags</h2>
    <span>Span 1</span>
    <span>Span 2</span>
    <span>Span 3</span>
  </body>
</html>
